<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi chút tâm tình</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        button { margin: 10px; padding: 15px 25px; cursor: pointer; border-radius: 20px; border: 1px solid #ddd; }
        button:hover { background-color: #f0f0f0; }
    </style>
</head>
<body>

    <h2 id="status">Hôm nay bạn thế nào?</h2>

    <button onclick="send('tired')">tired 😔</button>
    <button onclick="send('sad')">sad 😢</button>
    <button onclick="send('lonely')">lonely 🫥</button>
    <button onclick="send('nho')">nho 💌</button>

    <script>
    function send(feeling) {
        // 1. Gọi đến "hầm bí mật" trên Vercel của bạn
        // Người xem F12 sẽ chỉ thấy nó gọi đến /api/analytics
        fetch(`/api/analytics?type=${feeling}`);

        // 2. Đổi câu hỏi thành lời cảm ơn để làm người ta không nghi ngờ
        document.getElementById('status').innerText = "Cảm ơn bạn đã chia sẻ với mình nhé! ✨";
        
        // 3. Tắt thông báo alert cũ (vì alert hiện chữ 'nho' sẽ rất lộ)
        console.log("Interaction recorded."); 
    }
    </script>

</body>
</html>
