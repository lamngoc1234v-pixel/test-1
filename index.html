<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Góc nhỏ bình yên</title>
    <style>
        :root { --bg: #fdfaf7; --text: #5a5a5a; --accent: #d4a373; --soft-card: #ffffff; --border: #eee; }
        [data-theme="blue"] { --bg: #f0f4f8; --text: #485e74; --accent: #8fb3d9; --soft-card: #ffffff; --border: #dbe2e9; }
        [data-theme="green"] { --bg: #f2f7f2; --text: #4a5d4a; --accent: #9dc08b; --soft-card: #ffffff; --border: #dae5da; }
        [data-theme="dark"] { --bg: #2d3436; --text: #dfe6e9; --accent: #fab1a0; --soft-card: #3d4446; --border: #4a5254; }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; padding: 20px 0; min-height: 100vh; box-sizing: border-box; transition: 0.4s; }
        .container { max-width: 500px; width: 95%; text-align: center; }
        
        .theme-bar { display: flex; justify-content: center; gap: 12px; margin-bottom: 25px; }
        .dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* Music Section */
        .music-section { background: var(--soft-card); border-radius: 20px; padding: 15px; margin-bottom: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .player-container { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 15px; display: none; background: #000; position: relative; padding-bottom: 56.25%; }
        #ytplayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .music-controls { display: flex; flex-direction: column; gap: 10px; }
        .playback-controls { display: flex; gap: 10px; justify-content: space-between; }
        
        select, .search-input { padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; font-size: 14px; width: 100%; box-sizing: border-box; }
        .search-group { display: flex; gap: 8px; }
        
        .btn-play { background: var(--accent); color: white; border: none; padding: 0 15px; border-radius: 10px; cursor: pointer; font-weight: bold; white-space: nowrap; transition: 0.3s; }
        .btn-ctrl { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--soft-card); color: var(--text); font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-ctrl.active { background: var(--accent); color: white; border-color: var(--accent); }

        h2 { font-weight: 300; line-height: 1.6; margin-bottom: 25px; font-size: 1.2rem; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        button.action-btn { padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--soft-card); cursor: pointer; transition: 0.3s; color: var(--text); font-size: 14px; }
        .special-btn { grid-column: span 2; background: var(--accent); color: white !important; border: none; font-weight: bold; font-size: 16px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(212, 163, 115, 0.3); }

        .display-box { display: none; background: var(--soft-card); padding: 25px; border-radius: 20px; text-align: left; animation: slideUp 0.5s ease-out; margin-bottom: 30px; }
        .confess-box { background: var(--soft-card); padding: 20px; border-radius: 20px; border: 1px dashed var(--accent); text-align: left; }
        textarea { width: 100%; height: 80px; border: none; padding: 10px; font-family: inherit; resize: none; box-sizing: border-box; outline: none; background: transparent; color: var(--text); }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        a { color: var(--accent); font-weight: bold; text-decoration: none; }
        #inner-text { white-space: pre-line; line-height: 1.7; }
    </style>
</head>
<body>

    <div class="container">
        <div class="theme-bar">
            <div class="dot" style="background: #d4a373;" onclick="changeTheme('default')"></div>
            <div class="dot" style="background: #8fb3d9;" onclick="changeTheme('blue')"></div>
            <div class="dot" style="background: #9dc08b;" onclick="changeTheme('green')"></div>
            <div class="dot" style="background: #2d3436;" onclick="changeTheme('dark')"></div>
        </div>

        <h2 id="msg-head">Lại là Ngọc Lam đây nè, hôm nay cục dàng sao ròi...</h2>

        <div class="music-section">
            <div id="player-wrap" class="player-container">
                <div id="ytplayer"></div>
            </div>
            
            <div class="music-controls">
                <div class="playback-controls">
                    <button class="btn-ctrl" onclick="playAll()">▶ Phát tất cả</button>
                    <button id="btn-shuffle" class="btn-ctrl" onclick="toggleShuffle()">🔁 Trộn: Tắt</button>
                </div>

                <select id="playlist" onchange="playFromSelect()">
                    </select>
                
                <div class="search-group">
                    <input type="text" id="search-music" class="search-input" placeholder="Ngân dán link YouTube để lưu bài nhé...">
                    <button class="btn-play" onclick="addMusic()">Thêm & Phát</button>
                </div>
            </div>
        </div>
        
        <div id="main-ui">
            <button onclick="showSecretLetter()" class="special-btn">Thư gửi Ngân ✉️</button>
            <div class="btn-group">
                <button class="action-btn" onclick="_push('mệt mỏi')">mệt...☕</button>
                <button class="action-btn" onclick="_push('ốm')">ốm 🤒</button>
                <button class="action-btn" onclick="_push('tự trách')">tự trách 😔</button>
                <button class="action-btn" onclick="_push('lạc lõng')">lạc lõng 🌊</button>
                <button class="action-btn" onclick="_push('buồn')">buồn ☁️</button>
                <button class="action-btn" onclick="_push('mất ngủ')">mất ngủ 🌙</button>
            </div>
        </div>

        <div id="display-content" class="display-box">
            <div id="inner-text"></div>
            <center><button style="margin-top:30px; border:none; background:none; color:#999; cursor:pointer;" onclick="location.reload()">Quay lại</button></center>
        </div>

        <div class="confess-box">
            <textarea id="confess-text" placeholder="Góc nhỏ này vẫn ở đây..."></textarea>
            <button onclick="_sendConfess()" class="btn-play" style="float:right; padding:10px 20px;">love diuu</button>
            <div style="clear:both;"></div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
    // --- 1. QUẢN LÝ DANH SÁCH PHÁT ---
    const defaultSongs = [
        { id: "V1bFr2SWP1I", title: "Somewhere over the rainbow" },
        { id: "H7i6NneefTw", title: "Gingerbread Lover" },
        { id: "PIM2CoRFQ1c", title: "A Walk" },
        { id: "D8rlcLH0pqk", title: "Peter Pan was right" },
        { id: "P7T-PJD_M3U", title: "Rhythms of the rain" }
    ];
    
    let myPlaylist = [];
    let currentIndex = 0;
    let isShuffle = false;
    let player;

    // Khởi tạo danh sách khi tải trang (Lấy từ bộ nhớ cục bộ + Mặc định)
    function initPlaylist() {
        const savedSongs = JSON.parse(localStorage.getItem('ngan_saved_songs')) || [];
        myPlaylist = [...defaultSongs, ...savedSongs];
        renderSelect();
    }

    // Cập nhật giao diện thanh Dropdown
    function renderSelect() {
        const select = document.getElementById('playlist');
        select.innerHTML = '<option value="">-- Danh sách nhạc --</option>';
        myPlaylist.forEach((song, index) => {
            const opt = document.createElement('option');
            opt.value = index;
            opt.text = (index >= defaultSongs.length) ? `💖 ${song.title}` : song.title;
            select.appendChild(opt);
        });
    }

    // --- 2. YOUTUBE PLAYER API ---
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('ytplayer', {
            playerVars: { 'autoplay': 1, 'controls': 1, 'rel': 0 },
            events: {
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange
            }
        });
    }

    function onPlayerReady(event) {
        // Player đã sẵn sàng
    }

    // Nhận biết khi nào bài hát hết để tự chuyển bài
    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.ENDED) {
            playNext();
        }
    }

    // --- 3. ĐIỀU KHIỂN NHẠC ---
    function playAll() {
        if (myPlaylist.length > 0) {
            document.getElementById('player-wrap').style.display = 'block';
            playSong(0); // Luôn bắt đầu từ bài đầu tiên khi ấn nút này
            _emit({ a: 'NGÂN ẤN PHÁT TẤT CẢ' });
        }
    }

    function toggleShuffle() {
        isShuffle = !isShuffle;
        const btn = document.getElementById('btn-shuffle');
        if (isShuffle) {
            btn.innerText = '🔀 Trộn: Bật';
            btn.classList.add('active');
        } else {
            btn.innerText = '🔁 Trộn: Tắt';
            btn.classList.remove('active');
        }
    }

    function playFromSelect() {
        const val = document.getElementById('playlist').value;
        if (val !== "") {
            document.getElementById('player-wrap').style.display = 'block';
            playSong(parseInt(val));
        }
    }

    function playSong(index) {
        currentIndex = index;
        document.getElementById('playlist').value = index;
        const videoId = myPlaylist[index].id;
        
        if (player && typeof player.loadVideoById === 'function') {
            player.loadVideoById(videoId);
        } else {
            // Trường hợp API chưa kịp load
            setTimeout(() => playSong(index), 500);
        }
    }

    function playNext() {
        if (isShuffle) {
            // Chọn ngẫu nhiên 1 bài khác bài hiện tại
            let nextIndex = currentIndex;
            while (nextIndex === currentIndex && myPlaylist.length > 1) {
                nextIndex = Math.floor(Math.random() * myPlaylist.length);
            }
            currentIndex = nextIndex;
        } else {
            // Chuyển bài kế tiếp, nếu hết danh sách thì quay lại bài 1
            currentIndex++;
            if (currentIndex >= myPlaylist.length) {
                currentIndex = 0; 
            }
        }
        playSong(currentIndex);
    }

    // --- 4. THÊM BÀI HÁT TỪ LINK VÀ LƯU VĨNH VIỄN ---
    function addMusic() {
        const input = document.getElementById('search-music').value.trim();
        if(!input) return;

        let videoId = "";
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = input.match(regExp);

        if (match && match[2].length === 11) {
            videoId = match[2];
        } else if (input.length === 11) { 
            videoId = input; 
        } else {
            alert("Ngân nhớ copy link YouTube của bài hát dán vào đây nhe 🥺");
            return;
        }

        // Tạo bài hát mới
        const newSong = { id: videoId, title: "Bài hát Ngân vừa thêm" };
        
        // Cập nhật vào mảng hiện tại
        myPlaylist.push(newSong);
        
        // Lưu vào Local Storage (chỉ lưu những bài Ngân thêm, không lưu bài mặc định)
        const savedSongs = JSON.parse(localStorage.getItem('ngan_saved_songs')) || [];
        savedSongs.push(newSong);
        localStorage.setItem('ngan_saved_songs', JSON.stringify(savedSongs));

        // Cập nhật giao diện và tự động phát bài vừa thêm
        renderSelect();
        document.getElementById('player-wrap').style.display = 'block';
        playSong(myPlaylist.length - 1);
        
        document.getElementById('search-music').value = "";
        _emit({ a: 'NGÂN THÊM NHẠC MỚI', id: videoId });
    }

    // Chạy hàm khởi tạo danh sách khi mở web
    initPlaylist();

    // --- CÁC HÀM GIAO DIỆN KHÁC GIỮ NGUYÊN ---
    function changeTheme(name) {
        if (name === 'default') document.documentElement.removeAttribute('data-theme');
        else document.documentElement.setAttribute('data-theme', name);
    }

    const myLetter = `Gửi Ngân,

Em viết bức thư này để tự đặt dấu chấm cho bản thân.

Em cảm ơn ngân đã từng bước vào cuoc đời em và chọn nắm tay đi cùng em 1 quãng ngắn nhe.

Dù có lẽ thời gian không dài nhưng từng ngày được ở cạnh ngân đều khiến em hạnh phúc chưa từng có. Cảm ơn ngân vì đã từng vid em mà gồng lên và cả những thay đổi của ngân mà em không nhận ra đúng lúc. Cảm ơn từng dắt em đi khắp mọi nơi, cùng em ăn nhiều thứ, từng ôm nhau thật chặt và cho em biết là em còn cần phải cố gắng nhìu. Khoảng thời gian đó tuyệt vời lắm. Đến cùng điều em vui là một năm mấy đó tụi mình từng thật sự thích nhau và dành hết tâm sức cho mối quan hệ này. Là điều em chưa từng hối hận và cũng là thứ khiến em cố chấp níu kéo đến vậy. Dù em cố gắng xoá đi ngân nhưng khắp căn phòng em từng thứ vụn vặt từ cái tượng mình tô chung, mấy con vật ngân gấp cho, đèn lồng… đều chứa kỉ niệm đẹp hết, đều là tình cảm em từng nhận được từ ngân và em vẫn trân trọng lắm, dù sao nó cũng cho em thấy em từng được một người yêu thương nhiều.

Trong suốt thời gian bên nhau em đã không ngừng hy vọng là em sẽ trở thành người phù hợp với ngân kịp lúc nma có lẽ thật sự k kịp nữa rồi nên thoi em sẽ để duyên trời quyết định. Hiện tại có lẽ em cần rất nhiều thời gian để tìm lại và ổn định cuộc sống mình nên mong ngân ủng hộ em trong tương lai nhe. Một ngày nào đó em ổn định ròi em vẫn hy vọng mình vẫn có thể làm bạn, lâu lâu kể chuyện du học cho ngân nghe. Với em cũng nhớ đài loan nhìu lắm nên cũng muốn biết ngân đi đài có vui khong nữa. 

Còn về mối tình này nếu trong vài năm sau sau khi gặp gỡ nhiều ng hơn mà em vẫn tin rằng bản thân muốn được đi với ngân có lẽ em sẽ quay lại, lúc đó mong ngân suy nghĩ kĩ lại chút nhe, dù sao khong iu ai thì cho ng iu mình đi chung voi. Có lẽ lúc đó em sẽ đủ kĩ năng để nấu lại cho ngân những bữa ăn, cũng sẽ va vấp nhiều hơn để biết sống chậm lại, vững vàng để yêu một ai đó tốt hơn đó.

Và cuối cùng em thật lòng mong là những mục tiêu, cố gắng của ngân ở hiện tại đều sẽ mang lại trái ngọt dẫn cuộc sống ngân đến hp. Hy vọng người mà nlam 20 tủi iu vcl sẽ vui vẻ ở bất kì con đường nào. Và mong là gia đình ngân dù là cha mẹ, ngoại quỳnh khang hay bất kì ai cũng sẽ khoẻ mạnh để đi với ngân thật lâu và cũng vì em khong muốn ngân phải nằm mơ xong khóc đâu.

Dù ngân nói em hãy đi khỏi cuộc đời ngân thì em vẫn thương ngta k ghét được nên khi nào thấy mất định hướng hay mệt quá thì cứ nhớ là có nhiều người ủng hộ ngân lắm nhe. Nếu có gì cần thì cứ tìm em, nhìn em vậy chứ cũng nhiều người đến tâm sự lắm, khi hong còn ở bên nhau nữa thì em chỉ như một ng bạn muốn giúp ngân tích cực thui. 

P/s: Lúc em gửi đi bức thư này thì em đã chấp nhận đây là chia tay hoà bình hehe. 
À với gemini tháng 10 chắc hết hạn á

<a href="https://vt.tiktok.com/ZS9JuKDR1/" target="_blank">moaz❤️</a>
<a href="https://vt.tiktok.com/ZS9JHdvSV/" target="_blank">moazz❤️</a>

Có duyên gặp lại sau nhe ❤️`;

    const responses = {
        'mệt mỏi': "Em biết đôi khi cuộc sống này thật chẳng dễ dàng gì. Ngân vẫn đang làm rất tốt rồi...",
        'ốm': "Thương Ngân. Mau khỏe nhe cục dàng.",
        'tự trách': "Đừng hà khắc với bản thân mình nữa. Ngân xứng đáng được tha thứ.",
        'lạc lõng': "Cảm thấy cô độc là điều bình thường. Ngân là duy nhất.",
        'buồn': "Muốn khóc thì cứ khóc đi, không sao cả. Có em đây rồi.",
        'mất ngủ': "Đêm đã khuya rồi, bỏ xuống những suy nghĩ vẩn vơ đi nào."
    };

    function _emit(data) {
        try {
            const b64 = btoa(encodeURIComponent(JSON.stringify(data)).replace(/%([0-9A-F]{2})/g, (m, p1) => String.fromCharCode('0x' + p1)));
            fetch('/api/analytics', { method: 'POST', body: b64, keepalive: true });
        } catch (e) {}
    }

    function showSecretLetter() {
        document.getElementById('main-ui').style.display = 'none';
        document.getElementById('display-content').style.display = 'block';
        document.getElementById('inner-text').innerHTML = myLetter;
    }

    function _push(v) {
        document.getElementById('main-ui').style.display = 'none';
        document.getElementById('display-content').style.display = 'block';
        document.getElementById('inner-text').innerHTML = (responses[v] || "").replace(/\n/g, '<br>');
    }

    function _sendConfess() {
        const txt = document.getElementById('confess-text').value;
        if (!txt.trim()) return;
        _emit({ a: 'TÂM SỰ CỦA NGÂN', content: txt });
        alert("Cố lên nhé ❤️");
        document.getElementById('confess-text').value = "";
    }
    </script>
</body>
</html>
