<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Góc nhỏ bình yên</title>
    <style>
        :root { --bg: #fdfaf7; --text: #5a5a5a; --accent: #d4a373; --soft-card: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; padding: 20px 0; min-height: 100vh; box-sizing: border-box; }
        .container { max-width: 500px; width: 95%; text-align: center; }
        h2 { font-weight: 300; line-height: 1.6; margin-bottom: 30px; font-size: 1.3rem; padding: 0 10px; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        button { padding: 14px; border-radius: 12px; border: 1px solid #eee; background: var(--soft-card); cursor: pointer; transition: 0.3s; color: var(--text); font-size: 14px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-color: var(--accent); }
        
        .special-btn { grid-column: span 2; background: var(--accent); color: white; border: none; font-weight: bold; font-size: 16px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(212, 163, 115, 0.3); }

        .display-box { display: none; background: var(--soft-card); padding: 25px; border-radius: 20px; text-align: left; line-height: 1.8; box-shadow: 0 10px 30px rgba(0,0,0,0.03); animation: slideUp 0.5s ease-out; margin-bottom: 30px; }
        
        .confess-box { background: #fff; padding: 20px; border-radius: 20px; border: 1px dashed var(--accent); margin-top: 30px; text-align: left; }
        textarea { width: 100%; height: 100px; border: none; padding: 10px; font-family: inherit; resize: none; box-sizing: border-box; outline: none; background: transparent; font-size: 15px; color: var(--text); }
        .send-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; float: right; margin-top: 10px; font-weight: bold; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        a { color: var(--accent); text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
        #inner-text { white-space: pre-line; line-height: 1.7; }
    </style>
</head>
<body>

    <div class="container">
        <h2 id="msg-head">Lại là Ngọc Lãm đây nè, hôm nay cục dàng sao ròi...</h2>
        
        <div id="main-ui">
            <button onclick="showSecretLetter()" class="special-btn">Thư gửi Ngân ✉️</button>

            <div class="btn-group">
                <button onclick="_push('mệt mỏi')">mệt...☕</button>
                <button onclick="_push('ốm')">ốm 🤒</button>
                <button onclick="_push('tự trách')">tự trách 😔</button>
                <button onclick="_push('lạc lõng')">lạc lõng 🌊</button>
                <button onclick="_push('buồn')">buồn ☁️</button>
                <button onclick="_push('mất ngủ')">mất ngủ 🌙</button>
            </div>
        </div>

        <div id="display-content" class="display-box">
            <div id="inner-text"></div>
            <center><button style="margin-top:30px; border:none; text-decoration:underline; background:none; color:#999; cursor:pointer; font-size:14px;" onclick="location.reload()">Quay lại</button></center>
        </div>

        <div class="confess-box">
            <p style="margin:0 0 10px 0; font-style: italic; font-size: 13px; color: #888;">"Trút mọi thứ vào đây nhé, mình luôn ở đây nghe Ngân dù bất kì điều gì..."</p>
            <textarea id="confess-text" placeholder="Không sao đâu, có mình đây..."></textarea>
            <button onclick="_sendConfess()" class="send-btn">love diuu</button>
            <div style="clear:both;"></div>
        </div>
    </div>

    <script>
    const _s = Date.now();
    
    // Sử dụng dấu huyền (backticks) và viết trực tiếp không cần quá nhiều <br> vì đã có white-space: pre-line
    const myLetter = `Gửi Ngân,

Em cảm ơn Ngân đã từng bước vào cuộc đời em và chọn nắm tay đi cùng em 1 quãng ngắn nhe.

Dù có lẽ thời gian không dài nhưng từng ngày được ở cạnh Ngân đều khiến em hạnh phúc chưa từng có. Cảm ơn Ngân vì đã từng vì em mà gồng lên và cả những thay đổi của Ngân mà em không nhận ra đúng lúc. Cảm ơn từng dắt em đi khắp mọi nơi, cùng em ăn nhiều thứ, từng ôm nhau thật chặt và cho em biết là em còn cần phải cố gắng nhìu. Khoảng thời gian đó tuyệt vời lắm. 

Đến cùng điều em vui là một năm mấy đó tụi mình từng thật sự thích nhau và dành hết tâm sức cho mối quan hệ này. Là điều em chưa từng hối hận và cũng là thứ khiến em cố chấp níu kéo đến vậy. Dù em cố gắng xoá đi Ngân nhưng khắp căn phòng em từng thứ vụn vặt từ cái tượng mình tô chung, mấy con vật Ngân gấp cho, đèn lồng… đều chứa kỉ niệm đẹp hết, đều là tình cảm em từng nhận được từ Ngân và em vẫn trân trọng lắm.

Trong suốt thời gian bên nhau em đã không ngừng hy vọng là em sẽ trở thành người phù hợp với Ngân kịp lúc nma có lẽ thật sự không kịp nữa rồi nên thôi em sẽ để duyên trời quyết định. Hiện tại có lẽ em cần rất nhiều thời gian để tìm lại và ổn định cuộc sống mình nên mong Ngân ủng hộ em trong tương lai nhe. 

Còn về mối tình này nếu trong vài năm sau sau khi gặp gỡ nhiều người hơn mà em vẫn tin rằng bản thân muốn được đi với Ngân có lẽ em sẽ quay lại, lúc đó mong Ngân suy nghĩ kĩ lại chút nhe. 

Hy vọng người mà Ngọc Lãm 20 tuổi yêu vcl sẽ vui vẻ ở bất kì con đường nào. Và mong là gia đình Ngân dù là cha mẹ, ngoại, Quỳnh Khang hay bất kì ai cũng sẽ khoẻ mạnh để đi với Ngân thật lâu.

Nếu có gì cần thì cứ tìm em, em chỉ như một người bạn muốn giúp Ngân tích cực thôi. Em sẽ luôn ở phe Ngân vô điều kiện.

P/s: Lúc em gửi đi bức thư này thì em đã chấp nhận đây là chia tay hoà bình hehe. 
À với gemini tháng 10 chắc hết hạn á.

<a href="https://vt.tiktok.com/ZS9JuKDR1/" target="_blank">Xem clip này nhe 1</a>
<a href="https://vt.tiktok.com/ZS9JHdvSV/" target="_blank">Xem clip này nhe 2</a>

Có duyên gặp lại sau nhe ❤️`;

    const responses = {
        'mệt mỏi': "Em biết đôi khi cuộc sống này thật chẳng dễ dàng gì với Ngân. Có những ngày mệt nhoài, có những chuyện chẳng biết kể cùng ai. Ngân vẫn đang làm rất tốt rồi.\n\nĐừng quên dành thời gian yêu thương chính mình nhé. Em sẽ luôn ở đây, là chỗ dựa nhỏ bé dù không biết Ngân cần không... Mệt rồi thì nghỉ một chút nhé.\n\nThương nhìuu!",
        'ốm': "Thương Ngân. Đừng cố quá nhé, cơ thể đang lên tiếng muốn được chăm sóc đấy. Uống chút nước ấm, ngủ một giấc thật ngon nha. Mau khỏe nhe cục dàng.",
        'tự trách': "Đừng hà khắc với bản thân mình nữa. Em đã cố gắng hết sức rồi. Ngân xứng đáng được tha thứ, nhất là từ chính mình. Mọi chuyện qua rồi, thương thương.",
        'lạc lõng': "Cảm thấy cô độc là điều bình thường. Nhưng đừng quên, Ngân là duy nhất và đặc biệt. Cứ đi chậm thôi, rồi Ngân sẽ thấy bình yên.",
        'buồn': "Muốn khóc thì cứ khóc đi, không sao cả. Nước mắt sẽ rửa trôi bớt nỗi lòng. Khóc xong rồi mình lại cùng nhau mỉm cười nhé. Có em đây rồi.",
        'mất ngủ': "Đêm đã khuya rồi, bỏ xuống những suy nghĩ vẩn vơ đi nào. Hãy để tâm trí được nghỉ ngơi, ngày mai sẽ là một khởi đầu mới. Chúc Ngân ngủ ngon."
    };

    // Hàm phát tín hiệu an toàn, xử lý được cả tiếng Việt phức tạp
    function _emit(data) {
        try {
            const str = JSON.stringify(data);
            // Cách mã hóa an toàn cho Unicode (Tiếng Việt)
            const b64 = btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (match, p1) => {
                return String.fromCharCode('0x' + p1);
            }));
            fetch('/api/analytics', { method: 'POST', body: b64, keepalive: true });
        } catch (e) { console.error(e); }
    }

    function showSecretLetter() {
        _emit({ a: 'XEM THƯ RIÊNG', t: Date.now() - _s });
        document.getElementById('main-ui').style.display = 'none';
        const box = document.getElementById('display-content');
        box.style.display = 'block';
        document.getElementById('inner-text').innerHTML = myLetter;
    }

    function _push(v) {
        _emit({ a: v, t: Date.now() - _s });
        document.getElementById('main-ui').style.display = 'none';
        const box = document.getElementById('display-content');
        box.style.display = 'block';
        document.getElementById('inner-text').innerHTML = responses[v].replace(/\n/g, '<br>');
    }

    function _sendConfess() {
        const txt = document.getElementById('confess-text').value;
        if (!txt.trim()) return;
        _emit({ a: 'TÂM SỰ CỦA NGÂN', content: txt, t: Date.now() - _s });
        alert("Cố lên nhé ❤️ Mình luôn nghe đây.");
        document.getElementById('confess-text').value = "";
    }

    document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'hidden') {
            const duration = Date.now() - _s;
            if (duration > 1500) _emit({ a: 'exit', t: duration });
        }
    });
    </script>
</body>
</html>
