<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <h2>Hôm nay bạn thế nào?</h2>
</head>

<body>

<button onclick="send('tired')">tired 😔</button>
<button onclick="send('sad')">sad</button>
<button onclick="send('lonely')">lonely 🫥</button>
<button onclick="send('nho')">nho 💌</button>

<script>
function send(feeling) {
  const url = "https://webhook.site/4e4c9296-d0d2-4e54-bc2f-5363b09c3bc4";

  // Sử dụng URLSearchParams để dữ liệu hiện ngay ở mục "Form values" hoặc "Query strings" cho dễ nhìn
  fetch(url + "?feeling=" + feeling, {
    method: "POST",
    mode: "no-cors"
  });

  alert("Đã gửi tâm trạng: " + feeling + " 💌");
}
</script>

</body>
</html>
