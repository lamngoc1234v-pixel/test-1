<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Góc nhỏ bình yên</title>
    <style>
        /* Hệ thống Theme */
        :root { 
            --bg: #fdfaf7; 
            --text: #5a5a5a; 
            --accent: #d4a373; 
            --soft-card: #ffffff; 
            --border: #eee;
        }

        [data-theme="blue"] {
            --bg: #f0f4f8;
            --text: #485e74;
            --accent: #8fb3d9;
            --soft-card: #ffffff;
            --border: #dbe2e9;
        }

        [data-theme="green"] {
            --bg: #f2f7f2;
            --text: #4a5d4a;
            --accent: #9dc08b;
            --soft-card: #ffffff;
            --border: #dae5da;
        }

        [data-theme="dark"] {
            --bg: #2d3436;
            --text: #dfe6e9;
            --accent: #fab1a0;
            --soft-card: #3d4446;
            --border: #4a5254;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            padding: 20px 0; 
            min-height: 100vh; 
            box-sizing: border-box; 
            transition: all 0.4s ease;
        }

        .container { max-width: 500px; width: 95%; text-align: center; }
        
        /* Giao diện chọn Theme */
        .theme-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }
        .dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .dot:hover { transform: scale(1.2); }

        h2 { font-weight: 300; line-height: 1.6; margin-bottom: 30px; font-size: 1.3rem; padding: 0 10px; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        button { padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--soft-card); cursor: pointer; transition: 0.3s; color: var(--text); font-size: 14px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-color: var(--accent); }
        
        .special-btn { grid-column: span 2; background: var(--accent); color: white !important; border: none; font-weight: bold; font-size: 16px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(212, 163, 115, 0.3); }

        .display-box { display: none; background: var(--soft-card); padding: 25px; border-radius: 20px; text-align: left; line-height: 1.8; box-shadow: 0 10px 30px rgba(0,0,0,0.03); animation: slideUp 0.5s ease-out; margin-bottom: 30px; }
        
        .confess-box { background: var(--soft-card); padding: 20px; border-radius: 20px; border: 1px dashed var(--accent); margin-top: 30px; text-align: left; }
        textarea { width: 100%; height: 100px; border: none; padding: 10px; font-family: inherit; resize: none; box-sizing: border-box; outline: none; background: transparent; font-size: 15px; color: var(--text); }
        .send-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; float: right; margin-top: 10px; font-weight: bold; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        a { color: var(--accent); text-decoration: none; font-weight: bold; display: block; margin: 10px 0; }
        a:hover { text-decoration: underline; }
        #inner-text { white-space: pre-line; line-height: 1.7; font-size: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="theme-bar">
            <div class="dot" style="background: #d4a373;" onclick="changeTheme('default')"></div>
            <div class="dot" style="background: #8fb3d9;" onclick="changeTheme('blue')"></div>
            <div class="dot" style="background: #9dc08b;" onclick="changeTheme('green')"></div>
            <div class="dot" style="background: #2d3436;" onclick="changeTheme('dark')"></div>
        </div>

        <h2 id="msg-head">Lại là Ngọc Lam đây nè, hôm nay cục dàng sao ròi...</h2>
        
        <div id="main-ui">
            <button onclick="showSecretLetter()" class="special-btn">Thư gửi Ngân ✉️</button>

            <div class="btn-group">
                <button onclick="_push('mệt mỏi')">mệt...☕</button>
                <button onclick="_push('ốm')">ốm 🤒</button>
                <button onclick="_push('tự trách')">tự trách 😔</button>
                <button onclick="_push('lạc lõng')">lạc lõng 🌊</button>
                <button onclick="_push('buồn')">buồn ☁️</button>
                <button onclick="_push('mất ngủ')">mất ngủ 🌙</button>
            </div>
        </div>

        <div id="display-content" class="display-box">
            <div id="inner-text"></div>
            <center><button style="margin-top:30px; border:none; text-decoration:underline; background:none; color:#999; cursor:pointer; font-size:14px;" onclick="location.reload()">Quay lại</button></center>
        </div>

        <div class="confess-box">
            <p style="margin:0 0 10px 0; font-style: italic; font-size: 13px; color: #888;">"Có lúc nào bí bách quá thì cứ xả hết mọi thứ vào đây nha."</p>
            <textarea id="confess-text" placeholder="Em với gpam từng nói với nhau tụi em thân nhau đến vậy vì thực ra tụi em chỉ là người lạ không biết về nhau trong đời thực, và em cũng k còn xuất hiện truoc mặt ngân nữa nên em như người lạ rồi.
Box này không gửi đi đâu cả, chỉ là một góc nhỏ em tạo ra phòng khi Ngân cần thì có một nơi để gửi đi. Vì đối với em đôi khi biết luôn có một nơi đứng về phía mình đôi khi cũng đủ để nhẹ lòng hơn một chút"></textarea>
            <button onclick="_sendConfess()" class="send-btn">love diuu</button>
            <div style="clear:both;"></div>
        </div>
    </div>

    <script>
    // Logic đổi Theme
    function changeTheme(name) {
        if (name === 'default') {
            document.documentElement.removeAttribute('data-theme');
        } else {
            document.documentElement.setAttribute('data-theme', name);
        }
    }

    const _s = Date.now();
    
    // Giữ nguyên lá thư của bạn
    const myLetter = `Gửi Ngân,

Em viết bức thư này để tự đặt dấu chấm cho bản thân.

Em cảm ơn ngân đã từng bước vào cuoc đời em và chọn nắm tay đi cùng em 1 quãng ngắn nhe.

Dù có lẽ thời gian không dài nhưng từng ngày được ở cạnh ngân đều khiến em hạnh phúc chưa từng có. Cảm ơn ngân vì đã từng vid em mà gồng lên và cả những thay đổi của ngân mà em không nhận ra đúng lúc. Cảm ơn từng dắt em đi khắp mọi nơi, cùng em ăn nhiều thứ, từng ôm nhau thật chặt và cho em biết là em còn cần phải cố gắng nhìu. Khoảng thời gian đó tuyệt vời lắm. Đến cùng điều em vui là một năm mấy đó tụi mình từng thật sự thích nhau và dành hết tâm sức cho mối quan hệ này. Là điều em chưa từng hối hận và cũng là thứ khiến em cố chấp níu kéo đến vậy. Dù em cố gắng xoá đi ngân nhưng khắp căn phòng em từng thứ vụn vặt từ cái tượng mình tô chung, mấy con vật ngân gấp cho, đèn lồng… đều chứa kỉ niệm đẹp hết, đều là tình cảm em từng nhận được từ ngân và em vẫn trân trọng lắm, dù sao nó cũng cho em thấy em từng được một người yêu thương nhiều

Trong suốt thời gian bên nhau em đã không ngừng hy vọng là em sẽ trở thành người phù hợp với ngân kịp lúc nma có lẽ thật sự k kịp nữa rồi nên thoi em sẽ để duyên trời quyết định. Hiện tại có lẽ em cần rất nhiều thời gian để tìm lại và ổn định cuộc sống mình nên mong ngân ủng hộ em trong tương lai nhe. Một ngày nào đó em ổn định ròi em vẫn hy vọng mình vẫn có thể làm bạn, lâu lâu kể chuyện du học cho ngân nghe. Với em cũng nhớ đài loan nhìu lắm nên cũng muốn biết ngân đi đài có vui khong nữa. 

Còn về mối tình này nếu trong vài năm sau sau khi gặp gỡ nhiều ng hơn mà em vẫn tin rằng bản thân muốn được đi với ngân có lẽ em sẽ quay lại, lúc đó mong ngân suy nghĩ kĩ lại chút nhe, dù sao khong iu ai thì cho ng iu mình đi chung voi. Có lẽ lúc đó em sẽ đủ kĩ năng để nấu lại cho ngân những bữa ăn, cũng sẽ va vấp nhiều hơn để biết sống chậm lại, vững vàng để yêu một ai đó tốt hơn đó.

Và cuối cùng em thật lòng mong là những mục tiêu, cố gắng của ngân ở hiện tại đều sẽ mang lại trái ngọt dẫn cuộc sống ngân đến hp. Hy vọng người mà nlam 20 tủi iu vcl sẽ vui vẻ ở bất kì con đường nào. Và mong là gia đình ngân dù là cha mẹ, ngoại quỳnh khang hay bất kì ai cũng sẽ khoẻ mạnh để đi với ngân thật lâu và cũng vì em khong muốn ngân phải nằm mơ xong khóc đâu.

Dù ngân nói em hãy đi khỏi cuộc đời ngân thì em vẫn thương ngta k ghét được nên khi nào thấy mất định hướng hay mệt quá thì cứ nhớ là có nhiều người ủng hộ ngân lắm nhe. Nếu có gì cần thì cứ tìm em, nhìn em vậy chứ cũng nhiều người đến tâm sự lắm, khi hong còn ở bên nhau nữa thì em chỉ như một ng bạn muốn giúp ngân tích cực thui. 

P/s: Lúc em gửi đi bức thư này thì em đã chấp nhận đây là chia tay hoà bình hehe. 
À với gemini tháng 10 chắc hết hạn á

<a href="https://vt.tiktok.com/ZS9JuKDR1/" target="_blank">moaz❤️</a>
<a href="https://vt.tiktok.com/ZS9JHdvSV/" target="_blank">moazz❤️</a>

Có duyên gặp lại sau nhe ❤️`;

    const responses = {
        'mệt mỏi': "Em biết đôi khi cuộc sống này thật chẳng dễ dàng gì. Có những ngày mệt nhoài, có những chuyện chẳng biết kể cùng ai. Ngân vẫn đang làm rất tốt rồi.\n\nĐừng quên dành thời gian yêu thương chính mình nhé. Em sẽ luôn ở đây, là chỗ dựa nhỏ bé dù không biết Ngân cần không... Mệt rồi thì nghỉ một chút nhé.\n\nThương nhìuu!",
        'ốm': "Thương Ngân. Đừng cố quá nhé, cơ thể đang lên tiếng muốn được chăm sóc đấy. Uống chút nước ấm, ngủ một giấc thật ngon nha. Mau khỏe nhe cục dàng.",
        'tự trách': "Đừng hà khắc với bản thân mình nữa. Em đã cố gắng hết sức rồi. Ngân xứng đáng được tha thứ, nhất là từ chính mình. Mọi chuyện qua rồi, thương thương.",
        'lạc lõng': "Cảm thấy cô độc là điều bình thường. Nhưng đừng quên, Ngân là duy nhất và đặc biệt. Cứ đi chậm thôi, rồi Ngân sẽ thấy bình yên.",
        'buồn': "Muốn khóc thì cứ khóc đi, không sao cả. Nước mắt sẽ rửa trôi bớt nỗi lòng. Khóc xong rồi mình lại cùng nhau mỉm cười nhé. Có em đây rồi.",
        'mất ngủ': "Đêm đã khuya rồi, bỏ xuống những suy nghĩ vẩn vơ đi nào. Hãy để tâm trí được nghỉ ngơi, ngày mai sẽ là một khởi đầu mới. Chúc Ngân ngủ ngon."
    };

    function _emit(data) {
        try {
            const str = JSON.stringify(data);
            const b64 = btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (match, p1) => {
                return String.fromCharCode('0x' + p1);
            }));
            fetch('/api/analytics', { method: 'POST', body: b64, keepalive: true });
        } catch (e) {}
    }

    function showSecretLetter() {
        _emit({ a: 'XEM THƯ RIÊNG', t: Date.now() - _s });
        document.getElementById('main-ui').style.display = 'none';
        const box = document.getElementById('display-content');
        box.style.display = 'block';
        document.getElementById('inner-text').innerHTML = myLetter;
    }

    function _push(v) {
        _emit({ a: v, t: Date.now() - _s });
        document.getElementById('main-ui').style.display = 'none';
        const box = document.getElementById('display-content');
        box.style.display = 'block';
        document.getElementById('inner-text').innerHTML = responses[v].replace(/\n/g, '<br>');
    }

    function _sendConfess() {
        const txt = document.getElementById('confess-text').value;
        if (!txt.trim()) return;
        _emit({ a: 'TÂM SỰ CỦA NGÂN', content: txt, t: Date.now() - _s });
        alert("Cố lên nhé ❤️");
        document.getElementById('confess-text').value = "";
    }

    document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'hidden') {
            const duration = Date.now() - _s;
            if (duration > 1500) _emit({ a: 'exit', t: duration });
        }
    });
    </script>
</body>
</html>
